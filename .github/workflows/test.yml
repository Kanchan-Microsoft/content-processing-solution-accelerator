name: Test Workflow 
on:
  push:
    branches:
      - main
      - dev
      - demo
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
    branches:
      - main
      - dev
      - demo

jobs:

  backend_tests:
    runs-on: ubuntu-latest
    

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/ContentProcessorAPI/requirements.txt
          pip install pytest-cov
          pip install pytest-asyncio
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD/src/backend" >> $GITHUB_ENV

  frontend_tests:
     runs-on: ubuntu-latest

     steps:
       - name: Checkout code
         uses: actions/checkout@v3

       - name: Set up Node.js
         uses: actions/setup-node@v3
         with:
           node-version: '20'
