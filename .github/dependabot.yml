version: 2
updates:
 # GitHub Actions dependencies


 - package-ecosystem: "pip"
   directory: "/src/ContentProcessorAPI"
   schedule:
     interval: "monthly"
   commit-message:
     prefix: "build"
   target-branch: "dependabotchanges"
   open-pull-requests-limit: 100



 
 - package-ecosystem: "npm"
   directory: "/src/ContentProcessorWeb"
   schedule:
     interval: "monthly"
   commit-message:
     prefix: "build"
   target-branch: "dependabotchanges"
   open-pull-requests-limit: 100
